<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <title>Mistermanch Flipbook</title>
</head>

<body>

    <div class="flipbook">
        <div class="hard front-cover"><div class="cover-title">Mistermanch</div></div>
        <div class="hard front-spine"></div>

        <div class="page"><div class="page-inner">Page 1</div></div>
        <div class="page"><div class="page-inner">Page 2</div></div>
        <div class="page"><div class="page-inner">Page 3</div></div>
        <div class="page"><div class="page-inner">Page 4</div></div>

        <div class="hard back-spine"></div>
        <div class="hard back-cover"><div class="cover-title">Thank You <br> <small>Mistermanch</small></div></div>
    </div>

    <script src="libraries/jquery-3.7.1.min.js"></script>
    <script src="libraries/turn.js"></script>
    <script src="script.js"></script>

</body>
</html>
